<!doctype html>
<html>
  <head>
    <title th:text="${project.name}"></title>
    <link
      rel="stylesheet"
      href="/webjars/bootstrap/5.3.3/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body>
    <div class="container-fluid py-3">
      <a href="/">Projects</a>
      <h1 th:text="${project.name}"></h1>
      <p>
        <b>Customer:</b> <span th:text="${project.customerName}"></span> |
        <b>Source:</b> <span th:text="${project.sourceSystem}"></span> |
        <b>Target:</b> <span th:text="${project.targetSystem}"></span>
      </p>
      <div class="row g-3">
        <div class="col-md-3">
          <div class="card">
            <div class="card-body">
              <h5>Target object types</h5>
              <div class="display-6" th:text="${#lists.size(types)}"></div>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card">
            <div class="card-body">
              <h5>Source tables</h5>
              <div class="display-6" th:text="${#lists.size(sources)}"></div>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card">
            <div class="card-body">
              <h5>Audit findings</h5>
              <div class="display-6" th:text="${#lists.size(findings)}"></div>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card">
            <div class="card-body">
              <h5>Open decisions</h5>
              <div class="display-6" th:text="${#lists.size(gaps)}"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="my-3">
        <a
          class="btn btn-primary"
          th:href="@{/projects/{id}/workspace(id=${project.id})}"
          >Open Target-First Mapping Workspace</a
        >
        <form
          class="d-inline"
          method="post"
          th:action="@{/projects/{id}/audit(id=${project.id})}"
        >
          <button class="btn btn-warning">Run Deterministic Audit</button>
        </form>
      </div>
      <h2>Configurable Windchill Target Tabs</h2>
      <ul class="nav nav-pills mb-3">
        <li class="nav-item" th:each="t:${types}">
          <a
            class="nav-link"
            th:href="@{/projects/{id}/workspace(id=${project.id},objectTypeId=${t.id})}"
            th:text="${t.displayName}"
          ></a>
        </li>
      </ul>
      <h2>Exports</h2>
      <div class="mb-2">
        <form
          class="d-inline"
          method="post"
          th:action="@{/projects/{id}/exports/MAPPING_SPECIFICATION(id=${project.id})}"
        >
          <button class="btn btn-outline-secondary">
            Mapping Specification
          </button>
        </form>
        <form
          class="d-inline"
          method="post"
          th:action="@{/projects/{id}/exports/CUSTOMER_REVIEW_WORKBOOK(id=${project.id})}"
        >
          <button class="btn btn-outline-secondary">
            Customer Review Workbook
          </button>
        </form>
        <form
          class="d-inline"
          method="post"
          th:action="@{/projects/{id}/exports/IMPLEMENTATION_REQUIREMENTS(id=${project.id})}"
        >
          <button class="btn btn-outline-secondary">
            Implementation Requirements Export
          </button>
        </form>
        <form
          class="d-inline"
          method="post"
          th:action="@{/projects/{id}/exports/MAPPING_DEFINITIONS_JSON(id=${project.id})}"
        >
          <button class="btn btn-outline-secondary">
            Mapping Definitions JSON
          </button>
        </form>
      </div>
      <ul>
        <li
          th:each="e:${exports}"
          th:text="${e.fileName + ' - ' + e.status}"
        ></li>
      </ul>
      <h2>Gap / Decision Log</h2>
      <table class="table table-sm">
        <tr>
          <th>Title</th>
          <th>Status</th>
          <th>Owner</th>
        </tr>
        <tr th:each="g:${gaps}">
          <td th:text="${g.title}"></td>
          <td th:text="${g.status}"></td>
          <td th:text="${g.owner}"></td>
        </tr>
      </table>
    </div>
  </body>
</html>
