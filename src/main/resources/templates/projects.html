<!doctype html>
<html>
  <head>
    <title>PLM Migration Assistant</title>
    <link
      rel="stylesheet"
      href="/webjars/bootstrap/5.3.3/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <h1>
        PLM Migration Assistant
        <a class="help-link" href="/help#overview" title="Help">?</a>
      </h1>
      <p class="lead">
        Deterministic, architect-guided source-to-Windchill mapping
        documentation. No AI, no auto-mapping, no executable script generation.
      </p>
      <form class="row g-2 mb-3" method="post" action="/projects">
        <div class="col">
          <input
            class="form-control"
            name="name"
            placeholder="Project name"
            required
          />
        </div>
        <div class="col">
          <input
            class="form-control"
            name="customerName"
            placeholder="Customer"
            required
          />
        </div>
        <div class="col-auto">
          <button class="btn btn-primary">Create Project</button>
        </div>
      </form>
      <form method="post" action="/demo-seed" class="mb-4">
        <button class="btn btn-success">
          Create Agile-to-Windchill Demo Project
        </button>
      </form>
      <div class="list-group">
        <a
          th:each="p:${projects}"
          class="list-group-item list-group-item-action"
          th:href="@{/projects/{id}(id=${p.id})}"
          ><strong th:text="${p.name}"></strong
          ><span class="ms-2" th:text="${p.customerName}"></span
          ><span
            class="badge bg-secondary float-end"
            th:text="${p.status}"
          ></span
        ></a>
      </div>
    </div>
  </body>
</html>
